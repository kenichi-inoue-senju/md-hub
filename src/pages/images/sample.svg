  </defs>
  <rect width="600" height="320" rx="20" fill="url(#bg)"/>
  <g transform="translate(40 40)">
    <rect width="520" height="240" rx="14" fill="url(#card)" stroke="#e2e8f0"/>
    <g transform="translate(28 28)">
