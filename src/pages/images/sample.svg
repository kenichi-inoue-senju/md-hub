        <text x="16" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7dd3fc">const</text>
        <text x="58" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fde68a">hub</text>
        <text x="92" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#e2e8f0">= </text>
